name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"

jobs:
  markdown-link-check:
    name: Check markdown links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          use-verbose-mode: "yes"
          config-file: ".github/mlc_config.json"
